apiVersion: v1
kind: ServiceAccount
metadata:
  name: sensor-sa
  namespace: argo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sensor-role
  namespace: argo
rules:
- apiGroups: ["argoproj.io"]
  resources:
    - workflows
    - workflowtemplates
  verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sensor-role-binding
  namespace: argo
subjects:
- kind: ServiceAccount
  name: sensor-sa
  namespace: argo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sensor-role